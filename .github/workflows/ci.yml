name: CI

on:
  push:
    branches:
      - master
      - main
      - refactor/align-with-slicer-conventions
  pull_request:
    branches:
      - master
      - main
      - refactor/align-with-slicer-conventions

jobs:
  test:
    name: "Python ${{ matrix.python-version }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    env:
      PYTHONPATH: ${{ github.workspace }}/ZebrafishEmbryoAnalyzer

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: pip install "pytest>=7" "platformdirs>=3" "numpy<2" "opencv-python-headless" "Pillow" "scikit-image" "scipy" "openpyxl"

      - name: Run plain-Python tests
        run: pytest tests/ -q --tb=short

      - name: Syntax check
        run: python -m compileall -q ZebrafishEmbryoAnalyzer/

      - name: Forbidden-files check
        shell: bash
        run: |
          FORBIDDEN=$(git ls-files notes/ .claude/ CLAUDE.md skills-lock.json)
          if [ -n "$FORBIDDEN" ]; then
            echo "ERROR: forbidden files tracked in git:"
            echo "$FORBIDDEN"
            exit 1
          fi
          echo "PASS: no forbidden files tracked"
